<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户画像 - 预览版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .tag-blue {
            background-color: #E6F7FF;
            color: #1890FF;
            border: 1px solid #91D5FF;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin: 2px;
        }
        .tag-red {
            background-color: #FFF1F0;
            color: #F5222D;
            border: 1px solid #FFA39E;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin: 2px;
        }
        .tag-yellow {
            background-color: #FFFBE6;
            color: #FAAD14;
            border: 1px solid #FFE58F;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin: 2px;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
            margin-bottom: 12px;
        }
        .active-tab {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Mock Data ---
        const mockCustomer = {
            name: '李贤',
            avatar: 'https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=illustration%20of%20a%20person%20avatar%2C%20artistic%20style%2C%20soft%20colors&image_size=square',
            phone: '16601515280',
            gender: '男'
        };

        const mockTagGroups = [
            {
                id: 'basic',
                title: '基础信息',
                icon: '📋',
                tags: [
                    { label: '企微添加时间_7月', color: 'blue' },
                    { label: '企微添加时间_4日', color: 'blue' },
                    { label: '企微添加时间_2025年', color: 'blue' },
                    { label: '客户类型_私人', color: 'blue' },
                    { label: '是否会员绑定_否', color: 'blue' },
                ]
            },
            {
                id: 'business',
                title: '业务状态',
                icon: '💼',
                tags: [
                    { label: '留资状态_有手机号', color: 'red' },
                    { label: '线索状态_无效', color: 'yellow' },
                    { label: '到店状态_未到店', color: 'yellow' },
                    { label: '试驾次数_2次', color: 'yellow' },
                ]
            },
            {
                id: 'marketing',
                title: '营销偏好',
                icon: '❤️',
                tags: [
                    { label: '活动标签_活动参与', color: 'yellow' },
                ]
            },
            {
                id: 'vehicle',
                title: '车辆信息',
                icon: '🚗',
                tags: [
                    { label: '全网上次回厂时间_2026年', color: 'blue' },
                    { label: '全网上次回厂时间_1日', color: 'blue' },
                    { label: '全网上次保养时间_2024年', color: 'blue' },
                    { label: '全网上次保养时间_21日', color: 'blue' },
                ]
            }
        ];

        // --- Components ---
        const Header = () => (
            <div className="bg-white">
                <div className="flex justify-between items-center px-4 py-2 text-xs font-medium">
                    <span>16:55</span>
                    <div className="flex gap-1 items-center">
                        <span>📶</span>
                        <span>📶</span>
                        <div className="flex items-center gap-0.5 border border-green-500 rounded-sm px-0.5 scale-90">
                            <div className="bg-green-500 w-3 h-2 rounded-sm"></div>
                            <span className="text-[8px] text-green-600">100</span>
                        </div>
                    </div>
                </div>
                <div className="flex items-center px-4 py-3 relative border-b border-gray-100">
                    <span className="text-xl">×</span>
                    <h1 className="absolute left-1/2 -translate-x-1/2 font-bold text-lg">客户画像</h1>
                </div>
            </div>
        );

        const ProfileCard = ({ customer }) => (
            <div className="bg-gradient-to-b from-[#3A7BD5] to-[#00D2FF] pt-4 pb-12 px-4 -mb-8">
                <div className="bg-white rounded-xl p-4 shadow-sm">
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex gap-3">
                            <img src={customer.avatar} className="w-12 h-12 rounded-full object-cover" />
                            <div>
                                <div className="flex items-baseline gap-2 mb-1">
                                    <h2 className="text-lg font-bold">{customer.name}</h2>
                                    <span className="text-gray-400 text-sm">姓名：{customer.name}</span>
                                </div>
                                <div className="flex items-center gap-4 text-sm text-gray-500">
                                    <span>手机号：{customer.phone}</span>
                                    <span>性别：{customer.gender}</span>
                                </div>
                            </div>
                        </div>
                        <button className="text-blue-500 text-sm">客户详情 &gt;</button>
                    </div>
                    <div className="h-px bg-gray-100 my-3" />
                    <div className="flex justify-around px-2">
                        <div className="flex flex-col items-center gap-1 text-gray-600">
                            <span className="text-xl">📞</span>
                            <span className="text-xs">电话</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 text-gray-600">
                            <span className="text-xl">👥</span>
                            <span className="text-xs">群聊</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 text-gray-600">
                            <span className="text-xl">💬</span>
                            <span className="text-xs">单聊</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TagSection = ({ groups }) => (
            <div className="card mt-4 mx-3">
                <div className="flex justify-between items-center mb-3">
                    <div className="flex items-center gap-2">
                        <span className="text-gray-700">🏷️</span>
                        <h3 className="font-bold">标签</h3>
                    </div>
                    <button className="text-blue-500 text-sm">查看全部 &gt;</button>
                </div>
                <div className="flex gap-3 mb-4">
                    <button className="px-3 py-1.5 border border-gray-200 rounded text-sm text-gray-600 flex items-center gap-1">
                        <span>＋</span> 打标签
                    </button>
                    <button className="px-3 py-1.5 border border-gray-200 rounded text-sm text-gray-600 flex items-center gap-1">
                        <span>📝</span> 编辑展示标签组
                    </button>
                </div>
                <div className="space-y-4">
                    {groups.map(group => (
                        <div key={group.id}>
                            <div className="flex items-center gap-2 mb-2 text-gray-400 text-sm">
                                <span>{group.icon}</span>
                                <span>{group.title}</span>
                            </div>
                            <div className="flex flex-wrap gap-1">
                                {group.tags.map((tag, idx) => (
                                    <span key={idx} className={`tag-${tag.color}`}>{tag.label}</span>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const ArchiveSection = () => (
            <div className="card mx-3">
                <div className="flex items-center gap-2 mb-3">
                    <span className="text-gray-700">📁</span>
                    <h3 className="font-bold">客户档案</h3>
                </div>
                <div className="flex border-b border-gray-100 mb-8 overflow-x-auto whitespace-nowrap scrollbar-hide">
                    {['售前线索', '潜客', '售后线索', '车主档案'].map((tab, idx) => (
                        <div key={idx} className={`px-4 py-2 text-sm ${idx === 0 ? 'active-tab' : 'text-gray-400'}`}>
                            {tab}
                        </div>
                    ))}
                </div>
                <div className="text-center py-4 text-gray-300 text-sm">
                    没有更多数据了
                </div>
            </div>
        );

        const ActivitySection = () => (
            <div className="card mx-3">
                <div className="flex items-center gap-2 mb-3">
                    <span className="text-gray-700">👤</span>
                    <h3 className="font-bold">客户动态</h3>
                </div>
                <div className="flex border-b border-gray-100 mb-4 overflow-x-auto whitespace-nowrap scrollbar-hide">
                    {['全部', '线索跟进', '好友跟进', '潜客跟进', '好友浏览', '活动'].map((tab, idx) => (
                        <div key={idx} className={`px-4 py-2 text-sm ${idx === 0 ? 'active-tab' : 'text-gray-400'}`}>
                            {tab}
                        </div>
                    ))}
                </div>
                <div className="flex gap-3">
                    <div className="bg-blue-50 p-2 rounded h-fit">
                        <span className="text-blue-500">🚩</span>
                    </div>
                    <div className="flex-1">
                        <div className="flex justify-between mb-1">
                            <span className="font-medium">活动参与记录</span>
                            <span className="text-xs text-gray-400">2026-03-05 18:21:35</span>
                        </div>
                        <p className="text-sm text-gray-400">生产验证优化无参与</p>
                    </div>
                </div>
            </div>
        );

        const BottomBar = () => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-3 pb-8">
                <div className="flex justify-center mb-4">
                    <button className="flex items-center gap-2 px-12 py-2 border border-gray-200 rounded-full text-gray-700">
                        <span>📝</span> 写好友跟进
                    </button>
                </div>
                <div className="flex justify-between items-center px-12 text-gray-400">
                    <span className="text-2xl">&lt;</span>
                    <span className="text-2xl">&gt;</span>
                </div>
                <div className="fixed bottom-24 right-4 bg-[#333] text-white w-14 h-14 rounded-full flex flex-col items-center justify-center shadow-lg cursor-pointer">
                    <span className="text-xl leading-none">💬</span>
                    <span className="text-[10px] scale-90">待办</span>
                </div>
            </div>
        );

        const App = () => (
            <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-32">
                <Header />
                <ProfileCard customer={mockCustomer} />
                <TagSection groups={mockTagGroups} />
                <ArchiveSection />
                <ActivitySection />
                <BottomBar />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
