<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端预览控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 40px;
            overflow: auto;
        }
        .device-frame {
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 0 0 12px #000, 0 0 0 14px #333, 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }
        .device-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background-color: #000;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 10;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            background-color: white;
        }
        .device-btn {
            padding: 12px 16px;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: #ccc;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-btn:hover {
            background-color: #444;
            color: white;
        }
        .device-btn.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        .device-info {
            font-size: 12px;
            opacity: 0.7;
        }
        .rotate-btn {
            margin-top: auto;
            padding: 12px;
            background-color: #444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .rotate-btn:hover {
            background-color: #555;
        }
        .device-frame.full-screen {
            width: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            max-width: none !important;
            max-height: none !important;
        }
        .device-frame.full-screen::before {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="preview-area">
        <div class="device-frame" id="deviceFrame" style="width: 375px; height: 667px;">
            <iframe src="/" id="appFrame"></iframe>
        </div>
    </div>

    <script>
        const devices = [
            { name: 'iPhone 16 Pro', width: 402, height: 874 },
        ];

        let currentDevice = devices[0]; // Default to iPhone 16 Pro
        let isLandscape = false;

        const deviceFrame = document.getElementById('deviceFrame');
        const appFrame = document.getElementById('appFrame');

        function updateFrame() {
            if (deviceFrame.classList.contains('full-screen')) return; // Skip if full screen

            const width = isLandscape ? currentDevice.height : currentDevice.width;
            const height = isLandscape ? currentDevice.width : currentDevice.height;
            
            deviceFrame.style.width = `${width}px`;
            deviceFrame.style.height = `${height}px`;

            // Adjust notch visibility for landscape/tablets if needed
            const notch = document.querySelector('.device-frame::before');
            if (isLandscape || currentDevice.width > 600) {
                notch.style.display = 'none';
                deviceFrame.style.borderRadius = '20px';
            } else {
                notch.style.display = 'block';
                deviceFrame.style.borderRadius = '40px';
            }
        }

        function checkPath() {
            try {
                // Check if iframe content is accessible (same origin)
                if (appFrame.contentWindow && appFrame.contentWindow.location) {
                    const path = appFrame.contentWindow.location.pathname;
                    if (path.includes('/wecom-sop')) {
                        if (!deviceFrame.classList.contains('full-screen')) {
                            deviceFrame.classList.add('full-screen');
                        }
                    } else {
                        if (deviceFrame.classList.contains('full-screen')) {
                            deviceFrame.classList.remove('full-screen');
                            updateFrame();
                        }
                    }
                }
            } catch (e) {
                console.log('Frame access error:', e);
            }
        }

        // Check immediately and then periodically
        setInterval(checkPath, 200);

        // Initialize
        updateFrame();
    </script>
</body>
</html>
